<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>P2P Mesh Test</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
    }
    #container {
      max-width: 600px;
      margin: auto;
    }
    input, button {
      padding: 8px;
      font-size: 14px;
      margin: 4px 0;
    }
    #log {
      background: #222;
      padding: 10px;
      height: 250px;
      overflow-y: auto;
      border: 1px solid #444;
      margin-top: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
<div id="container">
  <h2>P2P Mesh Client</h2>

  <div>
    <strong>Your Peer ID:</strong>
    <div id="selfId" style="font-family: monospace; margin: 6px 0;"></div>
  </div>

  <hr>

  <h3>Connect to Peer</h3>
  <input id="peerInput" placeholder="Enter peer ID" style="width: 100%;" />
  <button id="connectBtn">Connect</button>

  <hr>

  <h3>Messages</h3>
  <div id="log"></div>

  <input id="msgInput" placeholder="Type message…" style="width: 80%;" />
  <button id="sendBtn">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/gh/redx-00/RoosterMesh/client.js"></script>
<script>
  // Display your own ID
  document.getElementById("selfId").textContent = mesh.selfId;

  const log = (msg) => {
    const box = document.getElementById("log");
    box.textContent += msg + "\n";
    box.scrollTop = box.scrollHeight;
  };

  // Connect button
  document.getElementById("connectBtn").onclick = () => {
    const peerId = document.getElementById("peerInput").value.trim();
    if (!peerId) return;
    log("Connecting to " + peerId + "…");
    mesh.connectToPeer(peerId);
  };

  // Send message button
  document.getElementById("sendBtn").onclick = () => {
    const msg = document.getElementById("msgInput").value;
    if (!msg) return;

    for (const [peerId, entry] of mesh.peers.entries()) {
      if (entry.dc && entry.dc.readyState === "open") {
        entry.dc.send(msg);
        log("You → " + peerId + ": " + msg);
      }
    }
  };

  // Patch the client’s onmessage handler to log messages
  const origMap = mesh.peers;
  const handler = setInterval(() => {
    for (const [peerId, entry] of origMap.entries()) {
      if (entry.dc && !entry._patched) {
        entry._patched = true;
        entry.dc.onmessage = (e) => {
          log(peerId + " → You: " + e.data);
        };
      }
    }
  }, 500);
</script>

</body>
</html>
